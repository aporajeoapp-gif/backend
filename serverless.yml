service: readynx-backend
frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs18.x
  region: ap-south-1
  stage: prod
  timeout: 30
  memorySize: 1024

  environment:
    NODE_ENV: production
    MONGO_URI: ${env:MONGO_URI}
    JWT_SECRET: ${env:JWT_SECRET}
    SECRET_PASS_KEY: ${env:SECRET_PASS_KEY}
    PORT: ${env:PORT, '5000'}
    
    S3_BUCKET_NAME: ${env:S3_BUCKET_NAME}
    AWS_REGION: ${env:AWS_REGION, 'ap-south-1'}
    AWS_ACCESS_KEY_ID: ${env:AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${env:AWS_SECRET_ACCESS_KEY}
    

package:
  individually: false
  excludeDevDependencies: true
  patterns:
    - dist/**
    - node_modules/**
    - package.json
    - package-lock.json
    - '!src/**'
    - '!**/*.ts'
    - '!.git/**'
    - '!.env'
    - '!.env.*'
    - '!tests/**'
    - '!*.md'
    - '!.gitignore'
    

functions:
  api:
    handler: dist/index.handler
    events:
      - httpApi: '*'